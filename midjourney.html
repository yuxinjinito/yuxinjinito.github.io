<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Gallery — Yuxin Jin</title>
  <link rel="icon" type="image/x-icon" href="static/assets/favicon.ico" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="static/css/midjourney.css" />
</head>

<body>

  <!-- Top Bar -->
  <div class="top-bar">
    <a href="index.html" id="back-link">
      <span>←</span><span class="back-text"> Home</span>
    </a>
    <div class="top-right">
      <button class="theme-toggle" id="theme-toggle" aria-label="Toggle theme">
        <svg class="icon-sun" viewBox="0 0 24 24"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
        <svg class="icon-moon" viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      </button>
      <div class="lang-toggle">
        <button class="lang-btn" id="btn-en">EN</button>
        <button class="lang-btn" id="btn-zh">中</button>
      </div>
    </div>
  </div>

  <!-- Header -->
  <header class="site-header">
    <h1 id="header-title">Gallery</h1>
    <p class="subtitle" id="header-sub">AI-generated artworks with Midjourney</p>
  </header>

  <!-- Sort -->
  <div class="sort-bar-wrap" id="sort-bar"></div>

  <!-- Gallery -->
  <main class="gallery" id="gallery"></main>

  <!-- Modal -->
  <div class="modal-overlay" id="modal-overlay">
    <button class="modal-close" aria-label="Close">&times;</button>
    <div class="modal"></div>
  </div>

  <!-- Share Popup -->
  <div class="share-overlay" id="share-overlay">
    <div class="share-popup">
      <button class="share-popup-close" id="share-close">&times;</button>
      <div class="share-icons" id="share-icons"></div>
      <div class="share-link-bar">
        <input class="share-link-input" id="share-link-input" type="text" readonly />
        <button class="share-link-copy" id="share-link-copy">
          <svg viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
        </button>
      </div>
    </div>
  </div>

  <!-- Footer -->
  <footer class="site-footer">
    <span id="footer-text">Yuxin Jin — Midjourney Artworks</span>
  </footer>

  <!-- Firebase Realtime Database：用于全局点赞统计（需在 midjourney.js 中配置 FIREBASE_CONFIG） -->
  <script src="https://www.gstatic.com/firebasejs/10.14.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.0/firebase-database-compat.js"></script>
  <script src="static/js/midjourney.js"></script>
</body>

</html>
